<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box { fill:#fff; stroke:#333; stroke-width:2; }
    .title { font: bold 14px sans-serif; }
    .text { font: 12px monospace; }
    .small { font: 11px monospace; }
    .arrow { stroke:#333; stroke-width:1.5; fill:none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- TravelBookingSystem -->
  <rect x="40" y="20" width="320" height="140" rx="6" class="box"/>
  <text x="60" y="44" class="title">TravelBookingSystem</text>
  <text x="60" y="68" class="text">- flights: ArrayList&lt;Flight&gt;</text>
  <text x="60" y="88" class="text">- hotels: ArrayList&lt;Hotel&gt;</text>
  <text x="60" y="108" class="text">- reservations: ArrayList&lt;Reservation&gt;</text>
  <text x="60" y="128" class="small">+ start(), searchFlight(), bookFlight(), cancelReservation()</text>

  <!-- Flight box -->
  <rect x="420" y="10" width="220" height="80" rx="6" class="box"/>
  <text x="440" y="34" class="title">Flight</text>
  <text x="440" y="56" class="text">flightNumber, origin, destination, price</text>
  <text x="440" y="72" class="small">displayDetails()</text>

  <!-- Hotel box -->
  <rect x="420" y="110" width="220" height="80" rx="6" class="box"/>
  <text x="440" y="134" class="title">Hotel</text>
  <text x="440" y="156" class="text">hotelId, hotelName, location, price</text>
  <text x="440" y="172" class="small">displayDetails()</text>

  <!-- Reservation box -->
  <rect x="140" y="200" width="220" height="80" rx="6" class="box"/>
  <text x="160" y="224" class="title">Reservation</text>
  <text x="160" y="246" class="text">confirmationNumber: int</text>
  <text x="160" y="262" class="small">displayReservation()</text>

  <!-- FlightReservation & HotelReservation -->
  <rect x="420" y="220" width="220" height="60" rx="6" class="box"/>
  <text x="440" y="244" class="title">FlightReservation</text>
  <text x="440" y="260" class="small">extends Reservation</text>

  <rect x="420" y="300" width="220" height="60" rx="6" class="box"/>
  <text x="440" y="324" class="title">HotelReservation</text>
  <text x="440" y="340" class="small">extends Reservation</text>

  <!-- Arrows/Associations -->
  <path class="arrow" d="M360 90 L420 50"/>
  <text x="320" y="70" class="small">uses</text>

  <path class="arrow" d="M360 120 L420 150"/>
  <text x="320" y="140" class="small">uses</text>

  <path class="arrow" d="M260 240 L420 240"/>
  <text x="300" y="220" class="small">inherit / link</text>

  <path class="arrow" d="M520 170 L520 220"/>
  <text x="548" y="190" class="small">reservation for</text>

  <!-- Footer -->
  <text x="20" y="400" class="small">Generated UML diagram (simplified) - TravelBookingSystem and core entities</text>
</svg>
